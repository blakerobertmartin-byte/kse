<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KSE Construction Report</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

h1 {
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

label {
  font-weight: bold;
}

input, textarea {
  width: 100%;
  border: none;
  border-bottom: 1px solid #000;
  padding: 4px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #000;
  padding: 6px;
}

button {
  margin: 5px;
}

@media print {
  button {
    display: none;
  }
}
</style>
</head>

<body>

<h1>KSE Daily Construction Report</h1>

<div class="grid">
  <div><label>Project Name</label><input id="project_name"></div>
  <div><label>Project No.</label><input id="project_no"></div>
  <div><label>Contractor</label><input id="contractor"></div>
  <div><label>Report By</label><input id="report_by"></div>
  <div><label>Report No.</label><input id="report_no"></div>
  <div><label>Date</label><input id="calendar_day" type="date"></div>
  <div><label>Temperature</label><input id="temperature"></div>
  <div><label>Weather</label><input id="weather"></div>
</div>

<h3>Work Items</h3>
<table id="workTable">
<thead>
<tr><th>#</th><th>Item</th><th>Qty</th><th>Remarks</th><th></th></tr>
</thead>
<tbody></tbody>
</table>
<button onclick="addRow('workTable',4)">Add Row</button>

<h3>Labor</h3>
<table id="laborTable">
<thead>
<tr><th>#</th><th>No.</th><th>Description</th><th></th></tr>
</thead>
<tbody></tbody>
</table>
<button onclick="addRow('laborTable',3)">Add Row</button>

<h3>Equipment</h3>
<table id="equipTable">
<thead>
<tr><th>#</th><th>No.</th><th>Description</th><th></th></tr>
</thead>
<tbody></tbody>
</table>
<button onclick="addRow('equipTable',3)">Add Row</button>

<h3>Notes</h3>
<textarea id="notes"></textarea>

<br><br>

<button onclick="save()">Save</button>
<button onclick="load()">Load</button>
<button onclick="clearForm()">Clear</button>
<button onclick="window.print()">Print / PDF</button>

<script>
function addRow(tableId, cols, data=[]) {
  const table = document.getElementById(tableId).querySelector("tbody");
  const row = document.createElement("tr");

  const index = table.children.length + 1;
  row.innerHTML = `<td>${index}</td>`;

  for (let i=1;i<cols;i++) {
    row.innerHTML += `<td contenteditable="true">${data[i-1]||""}</td>`;
  }

  row.innerHTML += `<td><button onclick="this.closest('tr').remove()">X</button></td>`;
  table.appendChild(row);
}

function collectTable(tableId) {
  const rows = document.querySelectorAll(`#${tableId} tbody tr`);
  return Array.from(rows).map(r =>
    Array.from(r.children).slice(1,-1).map(td => td.innerText)
  );
}

function setTable(tableId, data, cols) {
  const tbody = document.querySelector(`#${tableId} tbody`);
  tbody.innerHTML = "";
  data.forEach(r => addRow(tableId, cols, r));
}

function collectData() {
  return {
    project_name: project_name.value,
    project_no: project_no.value,
    contractor: contractor.value,
    report_by: report_by.value,
    report_no: report_no.value,
    calendar_day: calendar_day.value,
    temperature: temperature.value,
    weather: weather.value,
    notes: notes.value,
    work: collectTable("workTable"),
    labor: collectTable("laborTable"),
    equip: collectTable("equipTable")
  };
}

function loadData(d) {
  project_name.value = d.project_name||"";
  project_no.value = d.project_no||"";
  contractor.value = d.contractor||"";
  report_by.value = d.report_by||"";
  report_no.value = d.report_no||"";
  calendar_day.value = d.calendar_day||"";
  temperature.value = d.temperature||"";
  weather.value = d.weather||"";
  notes.value = d.notes||"";

  setTable("workTable", d.work||[], 4);
  setTable("laborTable", d.labor||[], 3);
  setTable("equipTable", d.equip||[], 3);
}

function save() {
  localStorage.setItem("kse_report", JSON.stringify(collectData()));
  alert("Saved");
}

function load() {
  const d = JSON.parse(localStorage.getItem("kse_report"));
  if (d) loadData(d);
}

function clearForm() {
  if (!confirm("Clear form?")) return;
  localStorage.removeItem("kse_report");
  location.reload();
}

// autosave every 30s (same behavior as your React version)
setInterval(() => {
  localStorage.setItem("kse_draft", JSON.stringify(collectData()));
}, 30000);

// load draft on open
window.onload = () => {
  const draft = JSON.parse(localStorage.getItem("kse_draft"));
  if (draft) loadData(draft);
};
</script>

</body>
</html>
